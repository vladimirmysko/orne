services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orne}
      POSTGRES_USER: ${POSTGRES_USER:-orne}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orne}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
